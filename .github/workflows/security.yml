name: Segurança

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Varredura de secrets com Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: SAST com Bandit
        run: bandit -r src/ -ll -f json -o bandit-report.json

      - name: Publicar relatório Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Varredura de dependências com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  build-and-scan:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t calculadora-app:${{ github.sha }} .

      - name: Varredura da imagem com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: calculadora-app:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  dast-smoke:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Reconstruir imagem para o smoke test
        run: docker build -t calculadora-app:${{ github.sha }} .
        # Cada job roda num runner efêmero separado — a imagem construída em
        # build-and-scan não persiste entre jobs, por isso reconstruímos aqui.

      - name: Subir aplicação em contêiner
        run: docker run -d --name app-teste calculadora-app:${{ github.sha }} sleep 30

      - name: DAST smoke — verificar que o contêiner está operacional
        run: |
          docker exec app-teste python -c "
          from src.calculadora import calcular_desconto, calcular_imposto
          assert calcular_desconto(200, 25) == 150.0
          assert calcular_imposto(200, 10) == 20.0
          print('DAST smoke passou — aplicação operacional no contêiner')
          "

      - name: Parar contêiner de teste
        if: always()
        run: docker stop app-teste && docker rm app-teste
