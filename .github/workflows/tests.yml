name: Testes

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes unitários
        run: pytest tests/unit/ -n auto -m unit --tb=short --junitxml=report-unit.xml

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit
          path: report-unit.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes de integração
        run: pytest tests/integration/ -m integration --tb=short --junitxml=report-integration.xml
        env:
          DATABASE_URL: postgresql://test:test@localhost/testdb

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration
          path: report-integration.xml

  smoke-test:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Smoke test — verificar integridade do módulo
        run: |
          python -c "
          from src.calculadora import calcular_desconto, calcular_imposto, calcular_preco_final
          assert calcular_desconto(100, 10) == 90.0
          assert calcular_imposto(100, 15) == 15.0
          assert calcular_preco_final(100, 10, 10) == 99.0
          print('Smoke test passou — módulo operacional')
          "